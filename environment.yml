# SoymiR-atlas Conda environment
#
# Create with:
#   conda env create -f environment.yml
#
# Activate with:
#   conda activate soymir-atlas
#
# This environment covers:
#   1. Core reproducible modules: 02_miRNA_annotation, 04_miRNA_expression, 05_Figures
#   2. Optional raw-data example workflow: 01_miRNA_identification, 03_miRNA_targets
#
# Third-party tools NOT available via conda (install manually):
#   - miRDP2 v1.1.4     https://github.com/athmaiv/IPBV/blob/master/miRNA_tools/miRDP2-v1.1.4.tar.gz
#   - CleaveLand4 v4.5  https://github.com/MikeAxtell/CleaveLand4

name: soymir-atlas
channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # ── Core analysis (modules 02, 04, 05) ──
  - python>=3.10
  - blast>=2.15.0          # makeblastdb, blastn
  - cd-hit>=4.8.0          # cd-hit-est

  # ── Raw-data example workflow (modules 01, 03) ──
  - bowtie>=1.3.0          # bowtie-build, short-read alignment
  - fastp>=0.22.0          # sRNA-seq / degradome QC
  - seqkit>=2.12.0         # FASTQ/FASTA manipulation
  - samtools>=1.15.0       # BAM handling
  - sra-tools>=2.8.0       # prefetch, fasterq-dump
  - viennarna>=2.7.0       # RNAplex (miRDP2 internal)
  - perl>=5.32.0           # CleaveLand4 runtime

  # ── Figure generation ──
  - r-base>=4.3.0
  - r-ggplot2
  - r-dplyr
  - r-readr
  - r-scales

  # ── Python packages ──
  - pip
  - pip:
      - openpyxl>=3.1.0
      - pandas>=2.0.0
      - numpy>=1.24.0
      - scipy>=1.10.0
      - matplotlib>=3.7.0
      - Pillow>=10.0.0
